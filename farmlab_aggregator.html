<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmLab — Сводная таблица полей</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f4f6f9;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
  }

  header p {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .drop-zone {
    border: 2px dashed #d1d5db;
    border-radius: 10px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: #fafafa;
  }

  .drop-zone:hover, .drop-zone.over {
    background: #f0f4ff;
    border-color: #6366f1;
  }

  .drop-zone svg {
    width: 36px;
    height: 36px;
    color: #9ca3af;
    margin-bottom: 10px;
  }

  .drop-zone p {
    font-size: 14px;
    color: #6b7280;
  }

  .drop-zone span {
    color: #6366f1;
    font-weight: 500;
    cursor: pointer;
    text-decoration: underline;
  }

  .file-list {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 7px 12px;
    color: #374151;
  }

  .file-chip svg { color: #9ca3af; flex-shrink: 0; }

  .file-chip .rm {
    margin-left: auto;
    cursor: pointer;
    color: #9ca3af;
    background: none;
    border: none;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
  }
  .file-chip .rm:hover { color: #ef4444; }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 1.25rem;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #d1d5db;
    background: #fff;
    color: #374151;
    transition: background 0.12s;
  }

  button:hover { background: #f3f4f6; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: #6366f1;
    color: #fff;
    border-color: #6366f1;
  }
  .btn-primary:hover { background: #4f46e5; }

  .status {
    font-size: 13px;
    color: #6b7280;
    margin-top: 10px;
    min-height: 18px;
  }
  .status.err { color: #ef4444; }

  .result-section { display: none; }

  .result-section h2 {
    font-size: 15px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 12px;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    background: #f9fafb;
    font-weight: 600;
    color: #374151;
    text-align: left;
    padding: 10px 14px;
    border-bottom: 2px solid #e5e7eb;
    white-space: nowrap;
  }

  tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid #f3f4f6;
    color: #1a1a1a;
  }

  tbody tr:hover td { background: #f9fafb; }

  tbody tr.total td {
    font-weight: 600;
    background: #f0f4ff;
    border-top: 2px solid #e5e7eb;
    border-bottom: none;
  }

  .dl-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  footer {
    text-align: center;
    font-size: 12px;
    color: #9ca3af;
    margin-top: 2rem;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>FarmLab — Сводная таблица полей</h1>
    <p>Загрузите один или несколько экспортных файлов FarmLab (.xlsx) для автоматического расчёта средних значений по полям</p>
  </header>

  <div class="card">
    <div class="drop-zone" id="dz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <p><span id="browse-lbl">Выберите файлы</span> или перетащите сюда</p>
      <p style="margin-top:4px;font-size:12px;">Поддерживается: .xlsx (FarmLab экспорт)</p>
      <input type="file" id="file-input" multiple accept=".xlsx" style="display:none">
    </div>

    <div class="file-list" id="file-list"></div>

    <div class="actions">
      <button class="btn-primary" id="run-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3zM3 9h18M9 21V9"/></svg>
        Построить таблицу
      </button>
      <button id="clear-btn" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        Очистить
      </button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="card result-section" id="result-section">
    <h2>Сводная таблица по полям</h2>
    <div class="table-wrap">
      <table id="out-table"></table>
    </div>
    <div class="dl-row">
      <button id="dl-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Скачать .xlsx
      </button>
    </div>
  </div>

  <footer>ИП ПАН С.Г. · FarmLab Aggregator · 2026</footer>
</div>

<script>
const COL_FIELD = 'Название поля';
const COL_NO3   = 'Азот нитратный (NO3-N) [mg/kg]';
const COL_P2O5  = 'Фосфор (P2O5) [mg/kg]';
const COL_SOM   = 'Органическое вещество почвы (SOM) [%]';

let files = [];
let resultData = null;

const dz       = document.getElementById('dz');
const fi       = document.getElementById('file-input');
const flEl     = document.getElementById('file-list');
const runBtn   = document.getElementById('run-btn');
const clearBtn = document.getElementById('clear-btn');
const statusEl = document.getElementById('status');
const resultSec = document.getElementById('result-section');
const outTable = document.getElementById('out-table');
const dlBtn    = document.getElementById('dl-btn');

document.getElementById('browse-lbl').onclick = () => fi.click();
fi.onchange = e => addFiles([...e.target.files]);

dz.ondragover = e => { e.preventDefault(); dz.classList.add('over'); };
dz.ondragleave = () => dz.classList.remove('over');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('over'); addFiles([...e.dataTransfer.files]); };

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (f.name.endsWith('.xlsx') && !files.find(x => x.name === f.name)) files.push(f);
  });
  renderFileList();
}

function renderFileList() {
  flEl.innerHTML = '';
  files.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>${f.name}</span>
      <button class="rm" data-i="${i}" title="Удалить">✕</button>`;
    flEl.appendChild(chip);
  });
  flEl.querySelectorAll('.rm').forEach(el => el.onclick = () => { files.splice(+el.dataset.i, 1); renderFileList(); });
  runBtn.disabled = files.length === 0;
  clearBtn.style.display = files.length ? 'inline-flex' : 'none';
}

clearBtn.onclick = () => {
  files = [];
  renderFileList();
  resultSec.style.display = 'none';
  statusEl.textContent = '';
  fi.value = '';
};

runBtn.onclick = async () => {
  runBtn.disabled = true;
  statusEl.className = 'status';
  statusEl.textContent = 'Читаем файлы…';
  resultSec.style.display = 'none';

  try {
    const agg = {};

    for (const file of files) {
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, { type: 'array' });
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: null });

      rows.forEach(row => {
        const field = row[COL_FIELD];
        if (!field) return;
        const no3 = parseFloat(row[COL_NO3]);
        const p   = parseFloat(row[COL_P2O5]);
        const som = parseFloat(row[COL_SOM]);
        if (!agg[field]) agg[field] = { no3: [], p: [], som: [] };
        if (!isNaN(no3)) agg[field].no3.push(no3);
        if (!isNaN(p))   agg[field].p.push(p);
        if (!isNaN(som)) agg[field].som.push(som);
      });
    }

    const keys = Object.keys(agg);
    if (keys.length === 0) {
      statusEl.textContent = 'Данных не найдено. Проверьте заголовки колонок в файлах.';
      statusEl.classList.add('err');
      runBtn.disabled = false;
      return;
    }

    const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
    const fmt = v => v === null ? '—' : Math.round(v);

    const rows = keys.map(field => ({
      field,
      no3: avg(agg[field].no3),
      p:   avg(agg[field].p),
      som: avg(agg[field].som)
    }));

    const totals = {
      no3: avg(rows.flatMap(r => agg[r.field].no3)),
      p:   avg(rows.flatMap(r => agg[r.field].p)),
      som: avg(rows.flatMap(r => agg[r.field].som))
    };

    resultData = { rows, totals };

    outTable.innerHTML = `
      <thead><tr>
        <th>Название поля</th>
        <th>Среднее NO3-N [mg/kg]</th>
        <th>Среднее P2O5 [mg/kg]</th>
        <th>Среднее SOM [%]</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td>${r.field}</td>
          <td>${fmt(r.no3)}</td>
          <td>${fmt(r.p)}</td>
          <td>${fmt(r.som)}</td>
        </tr>`).join('')}
        <tr class="total">
          <td>Общий итог</td>
          <td>${fmt(totals.no3)}</td>
          <td>${fmt(totals.p)}</td>
          <td>${fmt(totals.som)}</td>
        </tr>
      </tbody>`;

    resultSec.style.display = 'block';
    statusEl.textContent = `Готово — обработано файлов: ${files.length}, полей: ${rows.length}`;
  } catch (e) {
    statusEl.textContent = 'Ошибка: ' + e.message;
    statusEl.classList.add('err');
  }
  runBtn.disabled = false;
};

dlBtn.onclick = () => {
  if (!resultData) return;
  const header = ['Название поля', 'Среднее NO3-N [mg/kg]', 'Среднее P2O5 [mg/kg]', 'Среднее SOM [%]'];
  const sheetData = [
    header,
    ...resultData.rows.map(r => [r.field,
      r.no3 !== null ? Math.round(r.no3) : '',
      r.p   !== null ? Math.round(r.p)   : '',
      r.som !== null ? Math.round(r.som) : ''
    ]),
    ['Общий итог',
      Math.round(resultData.totals.no3),
      Math.round(resultData.totals.p),
      Math.round(resultData.totals.som)
    ]
  ];
  const ws = XLSX.utils.aoa_to_sheet(sheetData);
  ws['!cols'] = [{ wch: 25 }, { wch: 22 }, { wch: 20 }, { wch: 18 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Сводная');
  XLSX.writeFile(wb, 'farmlab_сводная.xlsx');
};
</script>
</body>
</html>
